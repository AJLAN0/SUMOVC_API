<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — SUMO</title>
  <link rel="stylesheet" href="/admin/static/admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <p class="eyebrow" style="color: var(--accent); font-size: 0.8rem; font-weight: 600;">ربط ركاز · واتساب هاتف</p>
      <h1>مرحباً بك</h1>
      <p style="color: var(--text-muted); margin: -1rem 0 1.5rem; font-size: 0.95rem;">سجّل الدخول لإدارة الحجوزات والرسائل والتذكيرات</p>
      {% if not configured %}
      <div class="alert alert-warning">لوحة التحكم غير مُعدّة على الخادم. أضف ADMIN_EMAIL و ADMIN_PASSWORD_HASH و ADMIN_SESSION_SECRET.</div>
      {% endif %}
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" name="email" required autocomplete="username" class="form-input" dir="ltr" placeholder="email@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" name="password" required autocomplete="current-password" class="form-input" dir="ltr" />
        </div>
        <button type="submit" {% if not configured %}disabled{% endif %} class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.85rem;">
          دخول
        </button>
      </form>
    </div>
  </div>
</body>
</html>
