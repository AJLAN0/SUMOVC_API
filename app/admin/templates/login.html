<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SUMO Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center text-slate-100 p-4">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
    <p class="text-xs uppercase tracking-wider text-slate-500 mb-1">Rekaz–Hatif Middleware</p>
    <h1 class="text-2xl font-semibold text-white mb-6">Admin sign in</h1>
    {% if not configured %}
    <p class="text-amber-400 text-sm mb-4">Admin is not configured. Set ADMIN_EMAIL, ADMIN_PASSWORD_HASH, and ADMIN_SESSION_SECRET on the server.</p>
    {% endif %}
    {% if error %}
    <p class="text-red-400 text-sm mb-4">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Email</label>
        <input type="email" name="email" required autocomplete="username"
          class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
          class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <button type="submit" {% if not configured %}disabled{% endif %}
        class="w-full py-2.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 font-medium disabled:opacity-50">Sign in</button>
    </form>
  </div>
</body>
</html>
