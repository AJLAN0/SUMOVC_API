{% extends "base.html" %}
{% from "_macros.html" import page_header %}
{% block title %}تعديل قالب — SUMO{% endblock %}
{% block content %}
<a href="/dashboard/templates" class="btn btn-ghost btn-sm" style="margin-bottom: 1rem;">→ العودة للقوالب</a>
{{ page_header('تعديل القالب', '') }}
<p class="ltr font-mono" dir="ltr" style="color: var(--accent); margin: -1rem 0 1.5rem;">{{ tpl.name }}</p>

<div class="card" style="max-width: 560px;">
  <div class="card-body">
    <form method="post" action="/dashboard/templates/{{ tpl.id }}/edit">
      <div class="form-group">
        <label class="form-label">الاسم بالعربي</label>
        <input name="title_ar" value="{{ tpl.title_ar or '' }}" class="form-input" />
      </div>
      <div class="form-group">
        <label class="form-label">متغيرات القالب <span style="color: var(--text-dim);">سطر لكل متغير — بالترتيب</span></label>
        <textarea name="param_keys_text" required rows="8" class="form-input ltr font-mono" dir="ltr">{{ param_keys_text }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">ملاحظة</label>
        <input name="description" value="{{ tpl.description or '' }}" class="form-input" />
      </div>
      <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.25rem; cursor: pointer;">
        <input type="checkbox" name="enabled" {% if tpl.enabled %}checked{% endif %} style="width: 1.1rem; height: 1.1rem;" />
        مفعّل
      </label>
      <button type="submit" class="btn btn-primary" style="width: 100%;">حفظ التعديلات</button>
    </form>
  </div>
</div>
{% endblock %}
